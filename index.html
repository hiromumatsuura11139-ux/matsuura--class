つもりで動き、後から認識のずれが見つかる。</p></article><article><i>03</i><h3>トラブルを説明できない</h3><p>事実・原因・対応が混ざり、相手の不安を大きくしてしまう。</p></article></div></section>\n<section class=\"section dark\" id=\"program\"><div class=\"heading\"><p class=\"kicker\">PRACTICAL PROGRAM</p><h2>職場で必要な力を、<br>6つの場面から鍛える。</h2><p>実際の仕事を想定した対話・演習・振り返りを中心に進めます。</p></div><div class=\"cards skills\"><article><i>01</i><h3>報告</h3><p>結論と要点を整理し、相手が判断できる形で伝える。</p></article><article><i>02</i><h3>相談</h3><p>状況と自分の考えを示し、必要な助言を引き出す。</p></article><article><i>03</i><h3>確認</h3><p>曖昧なまま進めず、認識のずれを仕事の前に防ぐ。</p></article><article><i>04</i><h3>指示理解</h3><p>目的・期限・優先順位を捉え、次の行動につなげる。</p></article><article><i>05</i><h3>トラブル説明</h3><p>事実・原因・対応を整理し、落ち着いて説明する。</p></article><article><i>06</i><h3>対外対応</h3><p>日本人上司や取引先とのやり取りを、信頼につなげる。</p></article></div></section>\n<section class=\"section sand\"><div class=\"panel\"><p class=\"kicker\">FOR COMPANIES</p><h2>このような企業・人材に。</h2><ul><li>✓ N1・N2レベルでも、会議や報告に課題がある</li><li>✓ 日本人上司とベトナム人社員の認識のずれを減らしたい</li><li>✓ 翻訳ではなく、自分の言葉で説明・提案できる人材を育てたい</li><li>✓ 現場の具体的な課題に合わせた研修を実施したい</li></ul><small>※ 初級者向けの基礎日本語研修とは別枠です。一定の日本語力を持つ社員の「現場対応力」を対象とします。</small></div></section>\n<section class=\"section availability\" id=\"availability\"><div class=\"heading\"><p class=\"kicker\">AVAILABILITY</p><h2>事前相談可能時間</h2><p>2026年8月20日までの、相談・打ち合わせの基本的な対応可能時間です。8月21日以降の研修対応時間は、決まり次第更新します。</p></div><div class=\"table-wrap\"><table><caption>事前相談・打ち合わせ可能時間（8月20日まで）</caption><thead><tr><th>時間帯</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead><tbody><tr><th>7:00〜9:00</th><td class=\"yes\">○</td><td>×</td><td>×</td><td>×</td><td>×</td><td class=\"yes\">○</td></tr><tr><th>9:00〜12:00</th><td>×</td><td>×</td><td>×</td><td>×</td><td>×</td><td>×</td></tr><tr><th>13:00〜15:00</th><td>×</td><td>×</td><td>×</td><td class=\"yes\">○</td><td>×</td><td class=\"yes\">○</td></tr><tr><th>15:00〜17:00</th><td>×</td><td>×</td><td>×</td><td class=\"yes\">○</td><td>×</td><td class=\"yes\">○</td></tr><tr><th>17:00以降</th><td>×</td><td class=\"yes\">○</td><td>×</td><td class=\"yes\">○</td><td>×</td><td>×</td></tr></tbody></table><p class=\"note\"><b>○ 相談可能</b>　対応日は月曜日から土曜日までです。日曜日は原則として研修を実施しておりません。</p></div></section>\n<section class=\"section flow\"><div class=\"heading center\"><p class=\"kicker\">HOW IT WORKS</p><h2>導入までの流れ</h2><p>まずは課題を伺い、必要な研修だけをご提案します。</p></div><div class=\"steps\"><article><b>01</b><h3>課題を確認</h3><p>対象者・職場・困っている場面を伺います。</p></article><article><b>02</b><h3>研修を設計</h3><p>実際の業務場面に合わせて内容を組み立てます。</p></article><article><b>03</b><h3>実践と振り返り</h3><p>演習とフィードバックを繰り返し、現場定着を目指します。</p></article></div></section>\n<section class=\"section contact\" id=\"contact\"><div><p class=\"kicker\">CONTACT</p><h2>「日本語力」ではなく、<br>仕事の課題からご相談ください。</h2></div><div><p>対象人数や職場で困っている場面が、まだ整理できていなくても構いません。お話を伺いながら、研修の方向性を一緒に考えます。</p><a class=\"btn orange\" href=\"mailto:?subject=松浦クラスの研修相談\">メールで相談内容を作成 →</a><small>正式な連絡先は公開前に設定します。</small></div></section>\n</main><footer><b>松浦クラス</b><span>企業向け・実践日本語研修</span><small>© 2026 Matsuura Class</small></footer></body></html>\n","vi":"<!doctype html><html lang=\"vi\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><meta name=\"description\" content=\"Matsuura Class - đào tạo tiếng Nhật thực tiễn cho doanh nghiệp.\"><title>Matsuura Class｜Đào tạo tiếng Nhật thực tiễn</title><style>:root{--navy:#071d36;--cyan:#09a8cf;--pale:#edf9fb;--forest:#123f35;--orange:#dc5a16;--sand:#f2eadb;--muted:#60717b;--line:#d7e3e6}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--navy);font-family:Arial,\"Noto Sans JP\",\"Yu Gothic\",sans-serif}a{color:inherit;text-decoration:none}header{height:76px;padding:0 5vw;display:flex;align-items:center;gap:34px;position:sticky;top:0;background:#fffffff5;border-bottom:1px solid #e4ebed;z-index:20}.brand{font-size:24px;font-weight:800;line-height:1}.brand small{display:block;font-size:8px;letter-spacing:.2em;color:#71848c;margin-top:7px}nav{display:flex;gap:27px;margin-left:a gười nghe đưa ra quyết định.</p></article><article><i>02</i><h3>Trao đổi</h3><p>Trình bày tình hình và ý kiến để nhận được lời khuyên cần thiết.</p></article><article><i>03</i><h3>Xác nhận</h3><p>Ngăn ngừa sai lệch nhận thức ngay từ đầu.</p></article><article><i>04</i><h3>Hiểu chỉ thị</h3><p>Nắm rõ mục đích, thời hạn và mức độ ưu tiên.</p></article><article><i>05</i><h3>Giải thích sự cố</h3><p>Sắp xếp sự việc, nguyên nhân và cách xử lý rõ ràng.</p></article><article><i>06</i><h3>Giao tiếp đối ngoại</h3><p>Xây dựng niềm tin với cấp trên và đối tác người Nhật.</p></article></div></section>\n<section class=\"section sand\"><div class=\"panel\"><p class=\"kicker\">FOR COMPANIES</p><h2>Phù hợp với doanh nghiệp và nhân sự đang:</h2><ul><li>✓ Có trình độ N1/N2 nhưng vẫn gặp khó khăn khi họp hoặc báo cáo</li><li>✓ Muốn giảm chênh lệch nhận thức giữa cấp trên người Nhật và nhân viên Việt Nam</li><li>✓ Muốn nhân viên tự giải thích và đề xuất bằng lời của mình, không chỉ dịch</li><li>✓ Cần chương trình gắn với vấn đề cụ thể tại nơi làm việc</li></ul><small>※ Đây không phải khóa tiếng Nhật cơ bản. Chương trình dành cho nhân viên đã có năng lực tiếng Nhật nhất định.</small></div></section>\n<section class=\"section availability\" id=\"availability\"><div class=\"heading\"><p class=\"kicker\">AVAILABILITY</p><h2>Thời gian có thể tư vấn trước</h2><p>Khung giờ cơ bản dành cho tư vấn đến hết ngày 20/8/2026. Lịch đào tạo từ ngày 21/8 sẽ được cập nhật sau.</p></div><div class=\"table-wrap\"><table><caption>Thời gian tư vấn trước (đến hết ngày 20/8)</caption><thead><tr><th>Khung giờ</th><th>T2</th><th>T3</th><th>T4</th><th>T5</th><th>T6</th><th>T7</th></tr></thead><tbody><tr><th>7:00–9:00</th><td class=\"yes\">○</td><td>×</td><td>×</td><td>×</td><td>×</td><td class=\"yes\">○</td></tr><tr><th>9:00–12:00</th><td>×</td><td>×</td><td>×</td><td>×</td><td>×</td><td>×</td></tr><tr><th>13:00–15:00</th><td>×</td><td>×</td><td>×</td><td class=\"yes\">○</td><td>×</td><td class=\"yes\">○</td></tr><tr><th>15:00–17:00</th><td>×</td><td>×</td><td>×</td><td class=\"yes\">○</td><td>×</td><td class=\"yes\">○</td></tr><tr><th>Sau 17:00</th><td>×</td><td class=\"yes\">○</td><td>×</td><td class=\"yes\">○</td><td>×</td><td>×</td></tr></tbody></table><p class=\"note\"><b>○ Có thể trao đổi.</b> Về nguyên tắc, chương trình không được tổ chức vào Chủ nhật.</p></div></section>\n<section class=\"section flow\"><div class=\"heading center\"><p class=\"kicker\">HOW IT WORKS</p><h2>Quy trình triển khai</h2><p>Chúng tôi lắng nghe vấn đề và chỉ đề xuất nội dung thực sự cần thiết.</p></div><div class=\"steps\"><article><b>01</b><h3>Xác định vấn đề</h3><p>Trao đổi về đối tượng học và tình huống đang gặp khó khăn.</p></article><article><b>02</b><h3>Thiết kế chương trình</h3><p>Xây dựng nội dung phù hợp với tình huống thực tế.</p></article><article><b>03</b><h3>Thực hành và phản hồi</h3><p>Lặp lại bài tập và phản hồi để áp dụng tại nơi làm việc.</p></article></div></section>\n<section class=\"section contact\" id=\"contact\"><div><p class=\"kicker\">CONTACT</p><h2>Hãy bắt đầu từ vấn đề trong công việc, không chỉ từ “trình độ tiếng Nhật”.</h2></div><div><p>Ngay cả khi doanh nghiệp chưa xác định rõ số lượng học viên hoặc tình huống khó khăn, chúng ta vẫn có thể bắt đầu trao đổi.</p><a class=\"btn orange\" href=\"mailto:?subject=Tư vấn chương trình Matsuura Class\">Soạn nội dung tư vấn qua email →</a><small>Địa chỉ liên hệ chính thức sẽ được thiết lập trước khi công bố.</small></div></section></main><footer><b>松浦クラス</b><span>Đào tạo tiếng Nhật thực tiễn cho doanh nghiệp</span><small>© 2026 Matsuura Class</small></footer></body></html>\n"};const lang=new URLSearchParams(location.search).get('lang')==='vi'?'vi':'ja';document.open();document.write(pages[lang]);document.close();</script></body></html>
